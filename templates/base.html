<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Post Aruba â Address Change{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand-blue:   #3a378b;
      --brand-green:  #1fb25e;
      --brand-yellow: hsla(39,81%,57%,1);
      --bg-light:     #f2f2f9;
      --text-dark:    #333;
    }
    body { background: var(--bg-light); color: var(--text-dark); }
    .navbar-brand img { height: 36px; }
    .navbar { background: var(--brand-blue) !important; }
    .navbar-brand, .navbar-nav .nav-link, .navbar-text { color: #fff !important; }
    .navbar-nav .nav-link:hover { color: var(--brand-yellow) !important; }
    .btn-primary { background: var(--brand-blue); border-color: var(--brand-blue); }
    .btn-primary:hover { background: #2e2b70; border-color: #2e2b70; }
    .btn-success { background: var(--brand-green); border-color: var(--brand-green); }
    .badge-pending  { background: var(--brand-yellow); color: #333; }
    .badge-active   { background: var(--brand-green); color: #fff; }
    .badge-expired  { background: #dc3545; color: #fff; }
    .badge-cancelled{ background: #6c757d; color: #fff; }
    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .section-header { color: var(--brand-blue); font-weight: 700; }
    footer { border-top: 1px solid #ddd; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-envelope-at-fill me-2"></i>Post Aruba
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      {% if current_user %}
        <span class="navbar-text">
          <i class="bi bi-person-circle me-1"></i>{{ current_user.username }}
          <span class="badge bg-warning text-dark ms-1">{{ current_user.role }}</span>
        </span>
        <a href="/staff/dashboard" class="btn btn-sm btn-outline-light">Dashboard</a>
        <a href="/staff/logout" class="btn btn-sm btn-outline-light">Logout</a>
      {% else %}
        <a href="/staff/login" class="btn btn-sm btn-outline-light">Staff Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 mt-4" style="font-size:13px">
  &copy; 2026 Post Aruba. All rights reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
