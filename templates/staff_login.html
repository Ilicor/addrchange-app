{% extends "base.html" %}
{% block title %}Staff Login â Post Aruba{% endblock %}

{% block content %}
<div class="container" style="max-width:400px">
  <div class="card p-4 mt-4">
    <div class="text-center mb-3">
      <i class="bi bi-shield-lock-fill" style="font-size:2.5rem;color:var(--brand-blue)"></i>
      <h4 class="section-header mt-1">Staff Login</h4>
      <p class="text-muted" style="font-size:13px">Address Change Management Portal</p>
    </div>

    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" class="form-control" name="username" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
